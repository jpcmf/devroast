version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: devroast-db
    environment:
      POSTGRES_USER: ${DB_USER:-devroast}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devroast}
      POSTGRES_DB: ${DB_NAME:-devroast_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devroast}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devroast-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: devroast-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@devroast.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - devroast-network

volumes:
  postgres_data:
    driver: local

networks:
  devroast-network:
    driver: bridge
